name: Deploy to GitHub Pages

# Builds the Vite + vite-react-ssg site and publishes dist/ to GitHub Pages.
# Triggers only on main (post-merge) + manual dispatch, so unmerged feature
# branches never publish to the live thenowdesigns.com domain.
#
# One-time repo setting required: Settings → Pages → Build and deployment →
# Source = "GitHub Actions" (instead of "Deploy from a branch").
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
